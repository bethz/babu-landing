<svg width="280" height="320" viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg">
  <!-- BABU Mascot - Be A Better yoU! -->

  <!-- Body -->
  <ellipse cx="140" cy="195" rx="85" ry="90" fill="#5B9BD5" />
  <ellipse cx="120" cy="165" rx="45" ry="35" fill="#7AB3E0" opacity="0.5" />

  <!-- Feet -->
  <ellipse cx="105" cy="278" rx="28" ry="14" fill="#4A8BC2" />
  <ellipse cx="175" cy="278" rx="28" ry="14" fill="#4A8BC2" />

  <!-- Left arm -->
  <g transform="translate(55, 185) rotate(-15)">
    <ellipse cx="0" cy="20" rx="18" ry="28" fill="#4A8BC2" />
    <circle cx="-4" cy="-5" r="10" fill="#5B9BD5" />
  </g>

  <!-- Right arm -->
  <g transform="translate(225, 190) rotate(10)">
    <ellipse cx="0" cy="20" rx="18" ry="28" fill="#4A8BC2" />
    <circle cx="4" cy="-5" r="10" fill="#5B9BD5" />
  </g>

  <!-- Clipboard -->
  <g transform="translate(218, 170) rotate(12)">
    <rect x="-14" y="-20" width="28" height="38" rx="3" fill="#F0C75E" stroke="#D4A843" stroke-width="1.5" />
    <rect x="-8" y="-24" width="16" height="8" rx="2" fill="#D4A843" />
    <line x1="-8" y1="-8" x2="8" y2="-8" stroke="#D4A843" stroke-width="1.5" />
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#D4A843" stroke-width="1.5" />
    <line x1="-8" y1="4" x2="5" y2="4" stroke="#D4A843" stroke-width="1.5" />
    <polyline points="-8,10 -5,13 0,7" fill="none" stroke="#27AE60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Face -->
  <ellipse cx="140" cy="185" rx="55" ry="50" fill="#EAF2FA" />

  <!-- Eyes -->
  <circle cx="120" cy="175" r="10" fill="#2E4057" />
  <circle cx="160" cy="175" r="10" fill="#2E4057" />
  <circle cx="123" cy="172" r="3.5" fill="#FFFFFF" />
  <circle cx="163" cy="172" r="3.5" fill="#FFFFFF" />
  <circle cx="117" cy="177" r="1.5" fill="#FFFFFF" />
  <circle cx="157" cy="177" r="1.5" fill="#FFFFFF" />

  <!-- Cheeks -->
  <ellipse cx="100" cy="192" rx="12" ry="8" fill="#F4A460" opacity="0.45" />
  <ellipse cx="180" cy="192" rx="12" ry="8" fill="#F4A460" opacity="0.45" />

  <!-- Mouth -->
  <path d="M130 198 Q140 210 150 198" fill="none" stroke="#2E4057" stroke-width="2.5" stroke-linecap="round" />

  <!-- Ears -->
  <circle cx="70" cy="140" r="18" fill="#4A8BC2" />
  <circle cx="70" cy="140" r="10" fill="#7AB3E0" />
  <circle cx="210" cy="140" r="18" fill="#4A8BC2" />
  <circle cx="210" cy="140" r="10" fill="#7AB3E0" />

  <!-- Speech bubble -->
  <g transform="translate(175, 70)">
    <rect x="-40" y="-30" width="95" height="42" rx="12" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1.5" />
    <polygon points="-15,12 -25,25 -5,12" fill="#FFFFFF" stroke="#DEDEDE" stroke-width="1.5" />
    <polygon points="-14,11 -22,22 -6,11" fill="#FFFFFF" />
    <text x="7" y="-10" text-anchor="middle" font-size="11" font-weight="700" fill="#5B9BD5" font-family="Segoe UI, sans-serif">Be A</text>
    <text x="7" y="5" text-anchor="middle" font-size="11" font-weight="700" fill="#5B9BD5" font-family="Segoe UI, sans-serif">Better yoU!</text>
  </g>

  <!-- Star sparkles -->
  <g fill="#F0C75E" opacity="0.7">
    <polygon points="45,100 47,95 49,100 54,100 50,103 52,108 47,105 42,108 44,103 40,100" />
    <polygon points="235,95 237,90 239,95 244,95 240,98 242,103 237,100 232,103 234,98 230,95" />
    <polygon points="60,260 62,256 64,260 68,260 65,263 66,267 62,264 58,267 59,263 56,260" />
  </g>
</svg>
